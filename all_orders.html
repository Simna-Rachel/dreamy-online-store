<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Orders - Admin Dashboard</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: linear-gradient(135deg, #b3d9ff 0%, #e0f2f7 100%);
        }

        th {
            padding: 15px;
            text-align: left;
            color: #0099cc;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-bottom: 3px solid #0099cc;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }

        tbody tr:hover {
            background-color: #f9f9f9;
        }

        .order-id {
            font-weight: 600;
            color: #0099cc;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-confirmed {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-shipped {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .status-delivered {
            background-color: #cfe2ff;
            color: #084298;
            border: 1px solid #b6d4fe;
        }

        .status-cancelled {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-pending-payment {
            background-color: #e2e3e5;
            color: #383d41;
            border: 1px solid #d3d6d8;
        }

        .amount {
            font-weight: 600;
            color: #0099cc;
            font-size: 14px;
        }

        .action-group {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .dropdown {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            color: #333;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .dropdown:hover {
            border-color: #0099cc;
            box-shadow: 0 2px 4px rgba(0, 153, 204, 0.1);
        }

        .dropdown:focus {
            outline: none;
            border-color: #0099cc;
            box-shadow: 0 0 0 3px rgba(0, 153, 204, 0.1);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-update {
            background: linear-gradient(135deg, #5dade2 0%, #2e86de 100%);
            color: white;
        }

        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(46, 134, 222, 0.4);
        }

        .btn-update:active {
            transform: translateY(0);
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .delivery-note {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
            font-style: italic;
        }

        @media (max-width: 1200px) {
            .container {
                padding: 20px;
            }

            th, td {
                padding: 10px;
                font-size: 13px;
            }

            .dropdown, .btn {
                padding: 6px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>All Orders</h1>
        
        <div id="alert" class="alert"></div>

        <div class="table-wrapper">
            <table id="ordersTable">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Email</th>
                        <th>Items Ordered</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Update Status</th>
                    </tr>
                </thead>
                <tbody id="ordersBody">
                    <tr>
                        <td colspan="8" class="no-data">Loading orders...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Initialize orders from localStorage or use sample data
        function initializeOrders() {
            let orders = JSON.parse(localStorage.getItem('orders')) || [];
            
            // Sample data if no orders exist
            if (orders.length === 0) {
                orders = [
                    {
                        id: 8,
                        customer: 'dreamy',
                        email: 'dreamy@gmail.com',
                        items: [{ name: 'Item 1', quantity: 1 }],
                        total: 0.00,
                        status: 'confirmed',
                        paymentStatus: 'pending',
                        date: '01 Apr 2026',
                        createdAt: new Date('2026-04-01').getTime()
                    },
                    {
                        id: 5,
                        customer: 'Twilight',
                        email: 'twilight@gmail.com',
                        items: [{ name: 'Item 1', quantity: 2 }],
                        total: 0.00,
                        status: 'confirmed',
                        paymentStatus: 'pending',
                        date: '27 Mar 2026',
                        createdAt: new Date('2026-03-27').getTime()
                    }
                ];
                localStorage.setItem('orders', JSON.stringify(orders));
            }
            
            return orders;
        }

        // Load and display orders
        function loadOrders() {
            const orders = initializeOrders();
            const tbody = document.getElementById('ordersBody');
            
            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="no-data">No orders found</td></tr>';
                return;
            }

            tbody.innerHTML = orders.map(order => `
                <tr>
                    <td class="order-id">#${order.id}</td>
                    <td>${order.customer}</td>
                    <td>${order.email}</td>
                    <td>${order.items.map(item => item.name).join(', ') || '—'}</td>
                    <td class="amount">$${parseFloat(order.total).toFixed(2)}</td>
                    <td>
                        <div style="display: flex; flex-direction: column; gap: 4px;">
                            <span class="status-badge status-${order.status}">${order.status.toUpperCase()}</span>
                            <span class="delivery-note">💰 Payment: ${order.paymentStatus === 'received' ? '✓ Received' : '⏳ Pending (after delivery)'}</span>
                        </div>
                    </td>
                    <td>${order.date}</td>
                    <td>
                        <div class="action-group">
                            <select class="dropdown" id="status-${order.id}">
                                <option value="">Select Status</option>
                                <option value="confirmed">Mark as Confirmed</option>
                                <option value="shipped">Mark as Shipped</option>
                                <option value="delivered">Mark as Delivered ✓</option>
                                <option value="cancelled">Cancel Order</option>
                            </select>
                            <button class="btn btn-update" onclick="handleUpdate(${order.id})">UPDATE</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Handle update button click
        function handleUpdate(orderId) {
            const dropdown = document.getElementById(`status-${orderId}`);
            const newStatus = dropdown.value;
            
            if (!newStatus) {
                showAlert('Please select a status first', 'error');
                return;
            }

            updateOrderStatus(orderId, newStatus);
            dropdown.value = '';
        }

        // Update order status
        function updateOrderStatus(orderId, newStatus) {
            if (!newStatus) return;

            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const order = orders.find(o => o.id === orderId);

            if (!order) {
                showAlert('Order not found', 'error');
                return;
            }

            const oldStatus = order.status;
            order.status = newStatus;

            // Payment logic: Only receive money when order is delivered
            if (newStatus === 'delivered' && order.paymentStatus !== 'received') {
                order.paymentStatus = 'received';
            }

            // If cancelled, payment remains pending/unreceived
            if (newStatus === 'cancelled') {
                order.paymentStatus = 'cancelled';
            }

            localStorage.setItem('orders', JSON.stringify(orders));

            // Show appropriate message based on status change
            let message = `✓ Order #${orderId} updated to ${newStatus.toUpperCase()}`;
            
            if (newStatus === 'shipped') {
                message += ' 📦 - Customer notified!';
                notifyCustomer(order, 'shipped');
            } else if (newStatus === 'delivered') {
                message += ' ✓ - Payment Received!';
                notifyCustomer(order, 'delivered');
            } else if (newStatus === 'cancelled') {
                message += ' ✗ - Order Cancelled';
            }

            showAlert(message, 'success');
            loadOrders();
        }

        // Notify customer about order status change
        function notifyCustomer(order, status) {
            const notifications = JSON.parse(localStorage.getItem('customerNotifications')) || [];
            
            let notificationMessage = '';
            let notificationIcon = '';

            if (status === 'shipped') {
                notificationMessage = `Your order #${order.id} has been shipped! 📦 Track your delivery here.`;
                notificationIcon = '📦';
            } else if (status === 'delivered') {
                notificationMessage = `Your order #${order.id} has been delivered! ✓ Thank you for your purchase.`;
                notificationIcon = '✓';
            }

            const notification = {
                orderId: order.id,
                customer: order.customer,
                email: order.email,
                message: notificationMessage,
                icon: notificationIcon,
                status: status,
                timestamp: new Date().toISOString(),
                read: false
            };

            notifications.push(notification);
            localStorage.setItem('customerNotifications', JSON.stringify(notifications));

            console.log(`📬 Notification sent to ${order.email}:`, notificationMessage);
        }

        // Show alert message
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';

            setTimeout(() => {
                alert.style.display = 'none';
            }, 4000);
        }

        // Load orders on page load
        window.addEventListener('DOMContentLoaded', loadOrders);

        // Refresh orders every 5 seconds
        setInterval(loadOrders, 5000);
    </script>
</body>
</html>
